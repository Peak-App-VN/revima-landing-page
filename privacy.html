</style>

/* ---------- render engine ---------- */
function inl(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>');
}
function block(bk){
  if(bk.p) return "<p>"+inl(bk.p)+"</p>";
  if(bk.h3) return "<h3>"+inl(bk.h3)+"</h3>";
  if(bk.ul) return "<ul>"+bk.ul.map(li=>"<li>"+inl(li)+"</li>").join("")+"</ul>";
  if(bk.note) return '<div class="note">'+inl(bk.note)+"</div>";
  if(bk.contact) return '<div class="contact-card"><div class="lbl">Email</div><div class="who">'+bk.contact.who+'</div><a href="mailto:'+bk.contact.email+'">'+bk.contact.email+"</a></div>";
  return "";
}
function render(lang){
  const main=document.getElementById("content");
  const toc=document.getElementById("toc");
  main.innerHTML=""; toc.innerHTML="";
  SECTIONS.forEach(s=>{
    const c=s[lang], sec=document.createElement("section");
    sec.className="sec"; sec.id=s.id; sec.setAttribute("data-od-id",s.id);
    const num=s.n?'<span class="n">'+String(s.n).padStart(2,"0")+"</span>":"";
    sec.innerHTML="<h2>"+num+"<span>"+inl(c.t)+"</span></h2>"+c.b.map(block).join("");
    main.appendChild(sec);
    if(s.n){
      const li=document.createElement("li");
      li.innerHTML='<a href="#'+s.id+'">'+inl(c.t)+"</a>";
      toc.appendChild(li);
    }
  });
  // ui strings
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n"); if(UI[lang][k]!=null) el.textContent=UI[lang][k];
  });
  document.documentElement.lang=UI[lang].htmlLang;
  document.title=UI[lang].title+" — Revima";
  setupSpy();
}
let spyEls=[];
function setupSpy(){
  spyEls=[...document.querySelectorAll("main section.sec")];
}
function onScroll(){
  if(!spyEls.length) return;
  let cur=spyEls[0]?.id;
  for(const el of spyEls){ if(el.getBoundingClientRect().top<=110) cur=el.id; }
  document.querySelectorAll("#toc a").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("href")==="#"+cur);
  });
}
/* ---------- lang control ---------- */
function setLang(lang){
  try{localStorage.setItem("revima_lang",lang)}catch(e){}
  document.querySelectorAll(".lang button").forEach(b=>b.setAttribute("aria-pressed", b.dataset.lang===lang?"true":"false"));
  render(lang); onScroll();
}
document.querySelectorAll(".lang button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));
window.addEventListener("scroll",onScroll,{passive:true});
let initLang="en";
try{const s=localStorage.getItem("revima_lang"); if(s==="vi"||s==="en") initLang=s;}catch(e){}
setLang(initLang);
</script>
